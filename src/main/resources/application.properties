# App
spring.application.name=person-service
application.version=0.0.1-SNAPSHOT
app.base-path=/person
server.port=${PERSONPORT:8080}

# Datasource (MariaDB)
spring.datasource.url=jdbc:mariadb://${PERSON_DB_HOST:localhost}:${PERSON_DB_PORT:3306}/${PERSON_DB_NAME:person}?useUnicode=true&characterEncoding=utf8&useSSL=false&connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true
spring.datasource.username=${PERSON_DB_USER:person}
spring.datasource.password=${PERSON_DB_PASSWORD:person}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Optional hilfreich:
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history_person
spring.flyway.baseline-on-migrate=true

# Logging
logging.level.org.flywaydb=INFO

# Swagger / OpenAPI (springdoc)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator (empfohlen)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true

# Security (OAuth2 Resource Server)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_JWKS_URI:http://localhost:8081/.well-known/jwks.json}
app.security.required-audience=${PERSON_SERVICE_AUD:person-service}
app.security.tenant-claim=${TENANT_CLAIM:tenant_id}
