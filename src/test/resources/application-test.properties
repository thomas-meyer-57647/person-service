spring.datasource.url=jdbc:h2:mem:person_service_test;DB_CLOSE_DELAY=-1;MODE=MYSQL;DATABASE_TO_UPPER=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration-test
spring.flyway.table=flyway_schema_history_person
spring.flyway.baseline-on-migrate=true

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://127.0.0.1:65535/mock-jwks
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://127.0.0.1:65535/mock-issuer
spring.autoconfigure.exclude=org.springframework.boot.security.oauth2.server.resource.autoconfigure.servlet.OAuth2ResourceServerAutoConfiguration

app.security.required-audience=person-service-test
app.security.tenant-claim=tenant_id
